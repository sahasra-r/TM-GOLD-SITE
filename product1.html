<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Product 1 - Temple Gold</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <script defer src="slider.js"></script>
</head>
<body>
  <main class="product-detail">

    <!-- Image Gallery -->
    <div class="product-gallery">
      <div class="slider-wrapper">
        <div class="slider" id="slider">
          <div class="slide"><img src="red main pack.jpg" alt="Image 1"></div>
          <div class="slide"><img src="back pack.jpg" alt="Image 2"></div>
          <div class="slide"><img src="reddd orange.png" alt="Image 3"></div>
          <div class="slide"><img src="all.png" alt="Image 4"></div>
        </div>
        <button class="arrow left" onclick="moveSlide(-1)">&#10094;</button>
        <button class="arrow right" onclick="moveSlide(1)">&#10095;</button>
      </div>

      <!-- Thumbnails -->
      <div class="thumbnail-bar">
        <img src="red main pack.jpg" onclick="goToSlide(0)" alt="Thumb 1">
        <img src="back pack.jpg" onclick="goToSlide(1)" alt="Thumb 2">
        <img src="reddd orange.png" onclick="goToSlide(2)" alt="Thumb 3">
        <img src="all.png" onclick="goToSlide(3)" alt="Thumb 4">
      </div>
    </div>

    <!-- Product Details -->
    <h2>Red Kumkum</h2>
    <p>This handcrafted Temple Gold product is perfect for traditional pooja and gifting purposes.</p>

    <ul style="text-align: left; max-width: 600px; margin: 1rem auto;">
      <li>✅ Pure and vibrant color</li>
      <li>✅ Hand-packed for hygiene</li>
      <li>✅ Multiple weight options</li>
      <li>✅ Affordable and premium quality</li>
    </ul>

    <h3>Price Range: ₹23 – ₹415 (Based on weight)</h3>

    <!-- Size Selection -->
    <div class="size-selection">
      <label>Select Sizes:</label>
        <div class="size-checkboxes">
          <label><input type="checkbox" value="40g - ₹23"> 40g - ₹23</label>
          <label><input type="checkbox" value="100g - ₹55"> 100g - ₹55</label>
          <label><input type="checkbox" value="200g - ₹108"> 200g - ₹108</label>
          <label><input type="checkbox" value="250g - ₹122"> 250g - ₹122</label>
          <label><input type="checkbox" value="500g - ₹225"> 500g - ₹225</label>
          <label><input type="checkbox" value="1000g - ₹415"> 1000g - ₹415</label>
      </div>
    </div>

<!-- Quantity Selector stays the same -->

    </div>

    <!-- Quantity Selector -->
    <div class="quantity-selection">
      <label for="quantity">Quantity:</label>
      <div class="quantity-controls">
        <button type="button" onclick="changeQuantity(-1)">−</button>
        <input type="text" id="quantity" name="quantity" value="1" readonly />
        <button type="button" onclick="changeQuantity(1)">+</button>
      </div>
    </div>

    <!-- Add to Cart and wishlist Button -->
    <div class="product-actions">
      <button class="add-cart-btn"
            onclick="addToCart('TM Gold Red Kumkum')">
        🛒 Add to Cart
      </button>

      <button class="add-wishlist-btn"
            onclick="addToWishlist('TM Gold Red Kumkum')">
        ❤️ Add to Wishlist
        </button>
    </div>


</main>

<script>
  const productName = "TM Gold Red Kumkum";

  function changeQuantity(amount) {
    const input = document.getElementById("quantity");
    let current = parseInt(input.value) || 1;
    current += amount;
    if (current < 1) current = 1;
    input.value = current;
  }

 function addToCart() {
  const checkboxes = document.querySelectorAll(".size-checkboxes input[type='checkbox']:checked");
  const quantity = parseInt(document.getElementById("quantity").value) || 1;
  const productName = "TMGold Red Kumkum";
  const productImage = "red main pack.jpg";

  if (checkboxes.length === 0) {
    alert("Please select at least one size before adding to cart.");
    return;
  }

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  checkboxes.forEach(cb => {
    cart.push({
      name: productName,
      size: cb.value,
      quantity: quantity,
      image: productImage
    });
  });

  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Selected products added to cart!");
  window.location.href = "cart.html";
}

// Update Cart Icon
function updateCartIcon() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const icon = document.getElementById("view-cart-icon");
    icon.textContent = `🛒 (${cart.length})`;
}
updateCartIcon();

// Add to Wishlist
function addToWishlist(productName) {
    let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
    wishlist.push({ name: productName });
    localStorage.setItem('wishlist', JSON.stringify(wishlist));
    alert(productName + " added to wishlist!");
}

</script>


</body>
</html>
